on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Hard pull and restart service
    runs-on: ubuntu-latest

    steps:
    - name: Install SSH key
      run: |
        install -m 600 -D /dev/null ~/.ssh/id_rsa
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts

    - name: SSH and deploy
      run: |
        ssh -t ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd ${{ secrets.WORK_DIR }}
          git fetch origin ${{ secrets.MAIN_BRANCH }}
          git reset --hard origin/${{ secrets.MAIN_BRANCH }}
          sudo systemctl restart the-world-bot
        EOF

    - name: Cleanup SSH
      run: rm -rf ~/.ssh